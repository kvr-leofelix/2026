<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Seamless Workflow Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15) 0%, rgba(10, 10, 10, 0) 50%);
        }
    </style>
</head>
<body class="antialiased font-sans">

    <nav class="glass-nav fixed w-full z-50 py-4 px-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">N</div>
            Nexus
        </div>
        <div class="hidden md:flex space-x-8 text-sm text-gray-400">
            <a href="#" class="hover:text-white transition-colors">Product</a>
            <a href="#" class="hover:text-white transition-colors">Solutions</a>
            <a href="#" class="hover:text-white transition-colors">Pricing</a>
        </div>
        <button class="bg-white text-black px-5 py-2 rounded-full text-sm font-semibold hover:bg-gray-200 transition-all">
            Get Started
        </button>
    </nav>

    <main class="relative pt-32 pb-20 px-6 hero-gradient min-h-screen flex flex-col items-center justify-center text-center">
        <div class="max-w-4xl mx-auto">
            <span id="badge" class="inline-block px-4 py-1.5 mb-6 text-xs font-medium tracking-wider text-blue-400 uppercase bg-blue-400/10 border border-blue-400/20 rounded-full">
                Introducing Nexus 2.0
            </span>
            <h1 id="hero-title" class="text-5xl md:text-7xl font-bold tracking-tight mb-8 leading-tight">
                Connect your workflow <br> <span class="text-gray-500">into one central hub.</span>
            </h1>
            <p id="hero-sub" class="text-lg md:text-xl text-gray-400 mb-10 max-w-2xl mx-auto">
                The intelligent command center for modern teams. Streamline communication, automate tasks, and scale faster with Nexus.
            </p>
            <div id="hero-ctas" class="flex flex-col sm:flex-row gap-4 justify-center">
                <button class="px-8 py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-600/20">
                    Start Your Free Trial
                </button>
                <button class="px-8 py-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl font-bold text-lg transition-all">
                    Book a Demo
                </button>
            </div>
        </div>

        <div id="hero-preview" class="mt-20 relative max-w-5xl mx-auto w-full group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>
            <div class="relative bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                <div class="h-8 border-b border-zinc-800 bg-zinc-900/50 flex items-center px-4 gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-zinc-700"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-zinc-700"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-zinc-700"></div>
                </div>
                <div class="p-4 md:p-8">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="h-32 bg-zinc-900 rounded-lg animate-pulse"></div>
                        <div class="h-32 bg-zinc-900 rounded-lg animate-pulse"></div>
                        <div class="h-32 bg-zinc-900 rounded-lg animate-pulse"></div>
                        <div class="col-span-2 h-48 bg-zinc-900 rounded-lg animate-pulse"></div>
                        <div class="h-48 bg-zinc-900 rounded-lg animate-pulse"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline({ defaults: { ease: "power4.out" } });

            // Entrance Animation
            tl.from("nav", {
                y: -100,
                opacity: 0,
                duration: 1
            })
            .from("#badge", {
                y: 20,
                opacity: 0,
                duration: 0.8
            }, "-=0.5")
            .from("#hero-title", {
                y: 40,
                opacity: 0,
                duration: 1
            }, "-=0.6")
            .from("#hero-sub", {
                y: 30,
                opacity: 0,
                duration: 1
            }, "-=0.8")
            .from("#hero-ctas", {
                y: 20,
                opacity: 0,
                duration: 0.8
            }, "-=0.7")
            .from("#hero-preview", {
                y: 60,
                scale: 0.95,
                opacity: 0,
                duration: 1.2
            }, "-=0.5");

            // Interactive Hover Effect for buttons
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    gsap.to(btn, { scale: 1.05, duration: 0.3 });
                });
                btn.addEventListener('mouseleave', () => {
                    gsap.to(btn, { scale: 1, duration: 0.3 });
                });
            });
        });
    </script>
</body>
</html>
